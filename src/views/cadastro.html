<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar-se</title>
    <link rel="stylesheet" href="../styles/cadastro.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">

    <link rel="icon" type="image/svg+xml" href="../../public/logo-ico.svg">

    
</head>
<body>
    <main class="container">
        <form class="form-cadastro" id="CadastroForm">
            <h1>Registrar-se no site!</h1>
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" id="usuario" name="usuario" required>
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="text" id="email" name="usuario" required>                
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="senha" name="senha" required>
            </div>
            <div class="btn">
                <button type="submit" class="btn-register">Cadastrar</button>
                <a href="./index.html">
                <button type="button" class="btn-cancel">Cancelar</button>
                </a>
                <a href="./login.html">
                <button type="button" class="btn-login">Já tem conta? Realize login!</button>
                </a>
            </div>
            
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.find.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
    <script type="module" src="../controllers/CadastroController.js" defer></script>
</body>
</html>
